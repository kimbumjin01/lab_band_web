<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <script src="https://unpkg.com/@streamlit/component-lib@2.0.0/dist/streamlit-component-lib.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      -webkit-user-select: none;
      user-select: none;
      touch-action: pan-x pan-y;
    }
    .hint {
      font-size: 0.9rem;
      color: #64748b;
      margin: 0 0 0.75rem;
      line-height: 1.45;
    }
    .wrap {
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      max-height: 62vh;
    }
    table {
      border-collapse: collapse;
      min-width: 100%;
    }
    th, td {
      border: 1px solid #e2e8f0;
      text-align: center;
      font-size: 0.72rem;
      padding: 0;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f1f5f9;
      font-weight: 700;
      padding: 0.45rem 0.35rem;
      white-space: nowrap;
    }
    th.time-col, td.time-col {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #f8fafc;
      font-weight: 600;
      min-width: 3.2rem;
      padding: 0.35rem;
    }
    th.corner {
      z-index: 3;
      left: 0;
      top: 0;
    }
    td.cell {
      width: 2.4rem;
      min-width: 2.4rem;
      height: 2rem;
      cursor: pointer;
      background: #fff;
      transition: background 0.08s ease;
    }
    td.cell.on {
      background: #3b82f6;
      box-shadow: inset 0 0 0 1px #2563eb;
    }
    td.cell.paint-off { background: #fff; }
    .footer {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    .count {
      font-size: 0.9rem;
      color: #475569;
      flex: 1;
    }
    button.save {
      background: linear-gradient(135deg, #5b21b6, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      min-width: 8rem;
    }
    button.save:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <p class="hint">손가락이나 마우스로 쓸어서 가능한 시간을 선택하세요. 파란 칸이 가능 시간입니다.</p>
  <div class="wrap" id="tableWrap"></div>
  <div class="footer">
    <span class="count" id="countLabel">선택 0칸</span>
    <button type="button" class="save" id="saveBtn">저장하기</button>
  </div>
  <script>
    const dates = (window.Streamlit && Streamlit.args && Streamlit.args.dates) || [];
    const times = (window.Streamlit && Streamlit.args && Streamlit.args.times) || [];
    let selected = Object.assign({}, (Streamlit.args && Streamlit.args.selected) || {});

    let isDragging = false;
    let paintValue = true;

    function key(dateIso, time) {
      return dateIso + "|" + time;
    }

    function updateCount() {
      const n = Object.values(selected).filter(Boolean).length;
      document.getElementById("countLabel").textContent = "선택 " + n + "칸";
    }

    function setCell(dateIso, time, on) {
      const k = key(dateIso, time);
      if (on) selected[k] = true;
      else delete selected[k];
    }

    function isOn(dateIso, time) {
      return !!selected[key(dateIso, time)];
    }

    function applyPaint(dateIso, time) {
      setCell(dateIso, time, paintValue);
      const el = document.querySelector(
        `td.cell[data-date="${dateIso}"][data-time="${time}"]`
      );
      if (el) {
        el.classList.toggle("on", paintValue);
        el.classList.toggle("paint-off", !paintValue);
      }
      updateCount();
    }

    function buildTable() {
      const wrap = document.getElementById("tableWrap");
      let html = "<table><thead><tr><th class='corner time-col'>시간</th>";
      dates.forEach((d) => {
        html += `<th>${d.label}</th>`;
      });
      html += "</tr></thead><tbody>";
      times.forEach((t) => {
        html += `<tr><td class="time-col">${t}</td>`;
        dates.forEach((d) => {
          const on = isOn(d.iso, t);
          html += `<td class="cell ${on ? "on" : ""}" data-date="${d.iso}" data-time="${t}"></td>`;
        });
        html += "</tr>";
      });
      html += "</tbody></table>";
      wrap.innerHTML = html;

      wrap.querySelectorAll("td.cell").forEach((cell) => {
        const start = (e) => {
          e.preventDefault();
          isDragging = true;
          const d = cell.dataset.date;
          const t = cell.dataset.time;
          paintValue = !isOn(d, t);
          applyPaint(d, t);
        };
        const enter = (e) => {
          if (!isDragging) return;
          e.preventDefault();
          applyPaint(cell.dataset.date, cell.dataset.time);
        };
        cell.addEventListener("mousedown", start);
        cell.addEventListener("mouseenter", enter);
        cell.addEventListener("touchstart", start, { passive: false });
        cell.addEventListener("touchmove", (e) => {
          if (!isDragging) return;
          e.preventDefault();
          const touch = e.touches[0];
          const target = document.elementFromPoint(touch.clientX, touch.clientY);
          if (target && target.classList.contains("cell")) {
            applyPaint(target.dataset.date, target.dataset.time);
          }
        }, { passive: false });
      });

      const stop = () => { isDragging = false; };
      document.addEventListener("mouseup", stop);
      document.addEventListener("touchend", stop);
      updateCount();
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      const payload = { action: "save", slots: selected };
      Streamlit.setComponentValue(payload);
    });

    Streamlit.setFrameHeight(120 + times.length * 34 + 80);
    buildTable();
    Streamlit.setComponentReady();
  </script>
</body>
</html>
